<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ごはんタイマー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #E8F5E9;
      color: #333;
      min-height: 100vh;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .back-btn {
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 12px;
      min-width: 48px;
      min-height: 48px;
    }
    .back-btn:active { background: #C8E6C9; }
    .header h1 {
      font-size: 28px;
      color: #43A047;
    }
    .columns {
      display: flex;
      gap: 28px;
      max-width: 740px;
      margin: 0 auto;
    }
    .column {
      flex: 1;
      min-width: 0;
      border-radius: 20px;
      padding: 16px 12px;
    }
    .column.nami {
      border: 3px solid #90CAF9;
      background: rgba(187, 222, 251, 0.2);
    }
    .column.rina {
      border: 3px solid #F48FB1;
      background: rgba(248, 187, 208, 0.2);
    }
    .column-title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 16px;
      padding: 8px;
      border-radius: 12px;
    }
    .column.nami .column-title {
      background: #BBDEFB;
      color: #1565C0;
    }
    .column.rina .column-title {
      background: #F8BBD0;
      color: #C2185B;
    }
    .timer-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 12px;
    }
    .timer-btn {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      border: none;
      font-size: 42px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      -webkit-user-select: none;
      user-select: none;
    }
    .timer-btn:active {
      transform: scale(0.95);
    }
    .timer-btn.plus {
      background: #43A047;
    }
    .timer-btn.stop {
      background: #757575;
      font-size: 36px;
    }
    .timer-btn.minus {
      background: #E53935;
    }
    .timer-display {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      padding: 8px 0;
    }
    .timer-display.negative {
      color: #E53935;
    }
    .timer-area {
      max-width: 740px;
      margin: 28px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .analog-timer {
      width: min(44vw, 300px);
      height: auto;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.12));
    }
    .timer-image {
      width: min(44vw, 300px);
      height: auto;
      border-radius: 16px;
    }
    .face-bg { fill: #fff; }
    .face-ring { fill: none; stroke: #43A047; stroke-width: 6; }
    .wedge { fill: #29B6F6; }
    .tick { stroke: #9E9E9E; stroke-width: 2; }
    .tick.major { stroke: #555; stroke-width: 3.5; }
    .num {
      fill: #444;
      font-family: inherit;
      font-size: 16px;
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .hub { fill: #fff; }
    .center-time {
      fill: #333;
      font-family: inherit;
      font-size: 30px;
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: central;
      font-variant-numeric: tabular-nums;
    }
    .done-msg {
      display: none;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #43A047;
      margin-top: 6px;
    }
    .done-msg.show {
      display: block;
    }
    #fireworks {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
    }
    .header, .columns, .timer-area {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="fireworks"></canvas>
  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'">◀ もどる</button>
    <h1>🍽️ ごはんタイマー</h1>
  </div>
  <div class="columns">
    <div class="column nami">
      <div class="column-title">🐬 なみ</div>
      <div class="timer-buttons">
        <button class="timer-btn plus" onclick="start('nami', 1)">+</button>
        <button class="timer-btn minus" onclick="start('nami', -1)">−</button>
        <button class="timer-btn stop" onclick="stop('nami')">■</button>
      </div>
      <div class="timer-display" id="timer-nami">00:00</div>
      <div class="done-msg" id="done-nami">🙏 ごちそうさまでした</div>
    </div>
    <div class="column rina">
      <div class="column-title">🌸 りな</div>
      <div class="timer-buttons">
        <button class="timer-btn plus" onclick="start('rina', 1)">+</button>
        <button class="timer-btn minus" onclick="start('rina', -1)">−</button>
        <button class="timer-btn stop" onclick="stop('rina')">■</button>
      </div>
      <div class="timer-display" id="timer-rina">00:00</div>
      <div class="done-msg" id="done-rina">🙏 ごちそうさまでした</div>
    </div>
  </div>
  <div class="timer-area">
    <svg id="analog" class="analog-timer" viewBox="0 0 240 240" role="img" aria-label="30分タイマー">
      <circle class="face-bg" cx="120" cy="120" r="112"></circle>
      <path id="wedge" class="wedge"></path>
      <g id="ticks"></g>
      <g id="numbers"></g>
      <circle class="face-ring" cx="120" cy="120" r="112"></circle>
      <circle class="hub" cx="120" cy="120" r="46"></circle>
      <text id="center-time" class="center-time" x="120" y="120">30:00</text>
    </svg>
    <img id="timer-image" class="timer-image" src="images/timer/30-20.png" alt="">
  </div>

  <script>
    const TOTAL_DURATION = 30 * 60; // アナログタイマーは30分
    const seconds = { nami: 0, rina: 0 };
    const timers = { nami: null, rina: null };
    const stopCount = { nami: 0, rina: 0 };
    let totalSeconds = 0;
    let totalTimer = null;

    function formatTime(s) {
      const abs = Math.abs(s);
      const mm = String(Math.floor(abs / 60)).padStart(2, '0');
      const ss = String(abs % 60).padStart(2, '0');
      return (s < 0 ? '-' : '') + mm + ':' + ss;
    }

    function updateDisplay(user) {
      const el = document.getElementById(`timer-${user}`);
      el.textContent = formatTime(seconds[user]);
      el.classList.toggle('negative', seconds[user] < 0);
    }

    // ===== アナログ30分タイマー =====
    const SVG_NS = 'http://www.w3.org/2000/svg';
    const CX = 120, CY = 120, R = 112, R_INNER = 76;

    function pointOnCircle(r, angleDeg) {
      // 12時方向を0度として時計回りに測る
      const a = (angleDeg - 90) * Math.PI / 180;
      return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
    }

    function buildDial() {
      const ticks = document.getElementById('ticks');
      const numbers = document.getElementById('numbers');
      for (let m = 0; m < 30; m++) {
        const angle = (m / 30) * 360;
        const major = m % 5 === 0;
        const [x1, y1] = pointOnCircle(major ? 98 : 104, angle);
        const [x2, y2] = pointOnCircle(112, angle);
        const line = document.createElementNS(SVG_NS, 'line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('class', 'tick' + (major ? ' major' : ''));
        ticks.appendChild(line);
      }
      for (let r5 = 5; r5 <= 30; r5 += 5) {
        const angle = (r5 / 30) * 360;
        const [x, y] = pointOnCircle(86, angle);
        const t = document.createElementNS(SVG_NS, 'text');
        t.setAttribute('x', x); t.setAttribute('y', y);
        t.setAttribute('class', 'num');
        t.textContent = r5;
        numbers.appendChild(t);
      }
    }

    function wedgePath(fraction) {
      fraction = Math.max(0, Math.min(1, fraction));
      if (fraction === 0) return '';
      const ro = R, ri = R_INNER;
      if (fraction >= 1) {
        const [ot, oty] = pointOnCircle(ro, 0);
        const [ob, oby] = pointOnCircle(ro, 180);
        const [it, ity] = pointOnCircle(ri, 0);
        const [ib, iby] = pointOnCircle(ri, 180);
        // 外周は時計回り・内周は反時計回りに描いてリング（中抜き）にする
        return `M ${ot} ${oty} A ${ro} ${ro} 0 1 1 ${ob} ${oby} A ${ro} ${ro} 0 1 1 ${ot} ${oty} Z `
             + `M ${it} ${ity} A ${ri} ${ri} 0 1 0 ${ib} ${iby} A ${ri} ${ri} 0 1 0 ${it} ${ity} Z`;
      }
      const end = fraction * 360;
      const [osx, osy] = pointOnCircle(ro, 0);
      const [oex, oey] = pointOnCircle(ro, end);
      const [iex, iey] = pointOnCircle(ri, end);
      const [isx, isy] = pointOnCircle(ri, 0);
      const largeArc = end > 180 ? 1 : 0;
      return `M ${osx} ${osy} A ${ro} ${ro} 0 ${largeArc} 1 ${oex} ${oey} `
           + `L ${iex} ${iey} A ${ri} ${ri} 0 ${largeArc} 0 ${isx} ${isy} Z`;
    }

    function timerImageFor(remaining) {
      // 30分を均等に4分割（各7分30秒 = 450秒）で切り替え
      const q = TOTAL_DURATION / 4;
      if (remaining > 3 * q) return 'images/timer/30-20.png';
      if (remaining > 2 * q) return 'images/timer/20-10.png';
      if (remaining > 1 * q) return 'images/timer/10-5.png';
      return 'images/timer/5-0.png';
    }

    function updateAnalog() {
      const remaining = Math.max(0, TOTAL_DURATION - totalSeconds);
      const fraction = remaining / TOTAL_DURATION;
      const wedge = document.getElementById('wedge');
      wedge.setAttribute('d', wedgePath(fraction));
      // 残りが少なく（0に近づく）なるほど 水色→緑→黄→赤 へ色相を変える
      wedge.style.fill = `hsl(${fraction * 199}, 90%, 55%)`;
      document.getElementById('center-time').textContent = formatTime(remaining);
      const img = document.getElementById('timer-image');
      const src = timerImageFor(remaining);
      if (!img.src.endsWith(src)) img.src = src;
    }

    function startTotal() {
      if (totalTimer) return;
      updateAnalog();
      totalTimer = setInterval(() => {
        totalSeconds++;
        if (totalSeconds >= TOTAL_DURATION) {
          totalSeconds = TOTAL_DURATION;
          updateAnalog();
          stopTotal();
          // 30分経過：ブラウザ全体をタイムアップ画像にする
          location.href = 'images/timer/timeup.png';
          return;
        }
        updateAnalog();
      }, 1000);
    }

    function stopTotal() {
      if (totalTimer) {
        clearInterval(totalTimer);
        totalTimer = null;
      }
    }

    // 切り替え時のちらつき防止に4枚を先読み
    ['30-20', '20-10', '10-5', '5-0'].forEach(name => {
      const im = new Image();
      im.src = `images/timer/${name}.png`;
    });

    buildDial();
    updateAnalog();

    function start(user, direction) {
      clearInterval(timers[user]);
      timers[user] = setInterval(() => {
        seconds[user] += direction;
        updateDisplay(user);
      }, 1000);
      stopCount[user] = 0;
      document.getElementById(`done-${user}`).classList.remove('show');
      stopFireworks();
      startTotal();
    }

    function stop(user) {
      clearInterval(timers[user]);
      timers[user] = null;
      stopCount[user]++;
      if (stopCount[user] >= 2) {
        document.getElementById(`done-${user}`).classList.add('show');
        const diff = Math.abs(seconds[user] - totalSeconds);
        if (diff <= 180) startFireworksFor(3000);
        if (stopCount.nami >= 2 && stopCount.rina >= 2) stopTotal();
      }
    }

    // ===== 花火アニメーション =====
    const fwCanvas = document.getElementById('fireworks');
    const fwCtx = fwCanvas.getContext('2d');
    const FW_BG = 'rgba(232, 245, 233, 0.25)';
    let fwRockets = [];
    let fwParticles = [];
    let fwActive = false;
    let fwAnimId = null;
    let fwLaunchTimer = 0;
    let fwStopAt = 0;

    function fwResize() {
      fwCanvas.width = window.innerWidth;
      fwCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', fwResize);
    fwResize();

    function fwLaunch() {
      const x = fwCanvas.width * (0.15 + Math.random() * 0.7);
      const targetY = fwCanvas.height * (0.02 + Math.random() * 0.18);
      fwRockets.push({
        x, y: fwCanvas.height, targetY,
        vy: -(12 + Math.random() * 3),
        hue: Math.floor(Math.random() * 360),
      });
    }

    function fwExplode(r) {
      const count = 50 + Math.floor(Math.random() * 30);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        fwParticles.push({
          x: r.x, y: r.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          hue: r.hue + Math.floor(Math.random() * 30 - 15),
        });
      }
    }

    function fwTick() {
      fwCtx.fillStyle = FW_BG;
      fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);

      for (let i = fwRockets.length - 1; i >= 0; i--) {
        const r = fwRockets[i];
        r.x += (Math.random() - 0.5) * 0.3;
        r.y += r.vy;
        r.vy += 0.12;
        fwCtx.beginPath();
        fwCtx.arc(r.x, r.y, 2.5, 0, Math.PI * 2);
        fwCtx.fillStyle = `hsl(${r.hue}, 100%, 75%)`;
        fwCtx.fill();
        if (r.y <= r.targetY || r.vy >= 0) {
          fwExplode(r);
          fwRockets.splice(i, 1);
        }
      }

      for (let i = fwParticles.length - 1; i >= 0; i--) {
        const p = fwParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.04;
        p.vx *= 0.99;
        p.vy *= 0.99;
        p.life -= 0.012;
        if (p.life <= 0) { fwParticles.splice(i, 1); continue; }
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
        fwCtx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.life})`;
        fwCtx.fill();
      }

      if (fwActive && fwStopAt && Date.now() >= fwStopAt) {
        fwActive = false;
      }

      if (fwActive) {
        fwLaunchTimer--;
        if (fwLaunchTimer <= 0) {
          fwLaunch();
          fwLaunchTimer = 25 + Math.floor(Math.random() * 35);
        }
      }

      if (fwActive || fwRockets.length || fwParticles.length) {
        fwAnimId = requestAnimationFrame(fwTick);
      } else {
        fwAnimId = null;
        fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
      }
    }

    function startFireworks() {
      if (fwActive) return;
      fwActive = true;
      fwLaunchTimer = 0;
      if (!fwAnimId) fwTick();
    }

    function startFireworksFor(ms) {
      const now = Date.now();
      fwStopAt = Math.max(fwStopAt, now) + ms;
      startFireworks();
    }

    function stopFireworks() {
      fwActive = false;
      fwStopAt = 0;
    }
  </script>
</body>
</html>
